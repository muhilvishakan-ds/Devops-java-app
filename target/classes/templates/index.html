<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DevOps Java App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0e1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 860px;
            width: 100%;
        }

        .header-banner {
            background: #0d1b2a;
            border: 2px solid #39ff14;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-banner .top-line {
            color: #f5a623;
            font-size: 13px;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

        .header-banner h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .header-banner h1 span {
            color: #39ff14;
        }

        .header-banner .bottom-line {
            color: #f5a623;
            font-size: 13px;
            letter-spacing: 3px;
            margin-top: 0.5rem;
        }

        .success-banner {
            background: #f5a623;
            border-radius: 8px;
            padding: 1.2rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .success-banner::before {
            content: '';
            position: absolute;
            left: -6px; top: 6px;
            width: 100%; height: 100%;
            background: #ff00c8;
            border-radius: 8px;
            z-index: -1;
        }

        .success-banner::after {
            content: '';
            position: absolute;
            left: -12px; top: 12px;
            width: 100%; height: 100%;
            background: #00e5ff;
            border-radius: 8px;
            z-index: -2;
        }

        .success-banner p {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0a0e1a;
        }

        .greeting-box {
            background: #0d1b2a;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }

        .greeting-box h2 {
            color: #39ff14;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .greeting-box p {
            font-size: 1.1rem;
            color: #ccd6f6;
            line-height: 1.7;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-row input {
            flex: 1;
            background: #0d1b2a;
            border: 1px solid #39ff14;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .form-row input::placeholder { color: #4a6080; }

        .form-row button {
            background: #39ff14;
            color: #0a0e1a;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .tool-circle {
            aspect-ratio: 1;
            border-radius: 50%;
            background: #39ff14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #0a0e1a;
            text-align: center;
            padding: 4px;
        }

        .tool-circle.maven  { background: #c71a1a; color: #fff; }
        .tool-circle.jenkins { background: #d33833; color: #fff; }
        .tool-circle.docker  { background: #0db7ed; color: #fff; }
        .tool-circle.sonar   { background: #4e9bcd; color: #fff; }
        .tool-circle.github  { background: #ffffff; color: #0a0e1a; }
        .tool-circle.java    { background: #f89820; color: #fff; }
        .tool-circle.linux   { background: #f5a623; color: #0a0e1a; }

        .env-box {
            background: #0d1b2a;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 1.5rem 2rem;
        }

        .env-box h2 {
            color: #39ff14;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .env-box pre {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #ccd6f6;
            line-height: 1.8;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header-banner">
        <div class="top-line">= = = = = = = = = = = = = = = = = = =</div>
        <h1>DevOps Java App — <span>Maven Build</span></h1>
        <div class="bottom-line">= = = = = = = = = = = = = = = = = = =</div>
    </div>

    <div class="success-banner">
        <p>Build successful! Ready for CI/CD!</p>
    </div>

    <div class="greeting-box">
        <h2>Greeting</h2>
        <p th:text="${message}">Hello, DevOps Engineer!</p>
    </div>

    <form class="form-row" action="/" method="get">
        <input type="text" name="name" placeholder="Enter your name..." th:value="${name}"/>
        <button type="submit">Greet Me</button>
    </form>

    <div class="tools-grid">
        <div class="tool-circle maven">Maven</div>
        <div class="tool-circle jenkins">Jenkins</div>
        <div class="tool-circle docker">Docker</div>
        <div class="tool-circle sonar">Sonar Qube</div>
        <div class="tool-circle github">GitHub</div>
        <div class="tool-circle java">Java</div>
        <div class="tool-circle linux">Linux</div>
    </div>

    <div class="env-box">
        <h2>Environment Info</h2>
        <pre th:text="${envInfo}"></pre>
    </div>

</div>
</body>
</html>
